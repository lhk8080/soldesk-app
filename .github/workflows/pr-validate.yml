name: PR Validate (dev → main)

# dev → main PR 시 안전망: 현재 dev 가 가리키는 ECR 이미지 trivy 재스캔.
# trivy DB 가 갱신되므로 dev push 때 통과한 이미지도 다시 스캔하는 게 안전.
# CRITICAL/HIGH 발견 시 Slack 알림.
on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/pr-validate.yml'

env:
  AWS_REGION:   ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  scan-dev-images:
    name: dev 이미지 Trivy 재스캔
    runs-on: ubuntu-latest
    steps:
      - name: soldesk-k8s 코드 가져오기 (dev tag 조회)
        uses: actions/checkout@v4
        with:
          repository: lhk8080/soldesk-k8s
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: soldesk-k8s

      - name: dev was.tag / worker.tag 추출
        id: tags
        run: |
          VALUES=soldesk-k8s/environments/dev/ticketing-values.yaml
          WAS=$(python3 -c "import re;print(re.search(r'image:\s*\n  was:\s*\n    tag:\s*(\S+)', open('$VALUES').read()).group(1))")
          WORKER=$(python3 -c "import re;print(re.search(r'  worker:\s*\n    tag:\s*(\S+)', open('$VALUES').read()).group(1))")
          # YAML 에 "" 또는 '' 로 감싸진 tag 값 정리 (build-backend.yml 이 quote 처리)
          WAS="${WAS//\"/}"; WAS="${WAS//\'/}"
          WORKER="${WORKER//\"/}"; WORKER="${WORKER//\'/}"
          echo "was=$WAS"       >> $GITHUB_OUTPUT
          echo "worker=$WORKER" >> $GITHUB_OUTPUT

      - name: AWS 자격증명
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy — ticketing-was
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/ticketing/ticketing-was:${{ steps.tags.outputs.was }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          format: 'json'
          output: 'trivy-was.json'

      - name: Trivy — worker-svc
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/ticketing/worker-svc:${{ steps.tags.outputs.worker }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          format: 'json'
          output: 'trivy-worker.json'

      - name: Trivy 결과 Slack 알림 (취약점 있을 때만)
        run: |
          notify() {
            local svc="$1" tag="$2" report="$3"
            local crit high total
            crit=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$report")
            high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$report")
            total=$((crit + high))
            echo "$svc CRITICAL=$crit HIGH=$high"
            if [ "$total" -eq 0 ]; then
              echo "$svc 취약점 없음 — 스킵"
              return 0
            fi
            local msg="[pr-validate] *${svc}*:\`${tag}\` — CRITICAL: ${crit}, HIGH: ${high} (PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.html_url }})"
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg t "$msg" '{text:$t}')" \
              "$WEBHOOK"
          }
          WEBHOOK=$(aws ssm get-parameter \
            --name /ticketing/prod/ARGOCD_SLACK_WEBHOOK \
            --with-decryption --query Parameter.Value --output text)
          export WEBHOOK
          notify ticketing-was "${{ steps.tags.outputs.was }}"    trivy-was.json
          notify worker-svc    "${{ steps.tags.outputs.worker }}" trivy-worker.json
