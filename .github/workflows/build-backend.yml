name: Backend - Test, Build & Publish

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION:   ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ticketing-was: ${{ steps.filter.outputs.ticketing-was }}
      worker-svc:    ${{ steps.filter.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ticketing-was: ['backend/ticketing-was/**']
            worker-svc:    ['backend/worker-svc/**']

  test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: backend/ticketing-was
            changed: ${{ needs.changes.outputs.ticketing-was }}
          - service: worker-svc
            path: backend/worker-svc
            changed: ${{ needs.changes.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Python 셋업
        if: matrix.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.path }}/requirements-dev.txt

      - name: 의존성 설치
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pip install -r requirements-dev.txt

      - name: pytest
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pytest -v tests/

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: backend/ticketing-was
            repo: ticketing/ticketing-was
            changed: ${{ needs.changes.outputs.ticketing-was }}
          - service: worker-svc
            path: backend/worker-svc
            repo: ticketing/worker-svc
            changed: ${{ needs.changes.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: AWS 자격증명
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: ECR 로그인
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드
        if: matrix.changed == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ matrix.repo }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ${{ matrix.path }}
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # 학습 단계: 리포트만 (exit-code 0). 익숙해지면 1 로 올려서 push 차단
      - name: Trivy 취약점 스캔
        if: matrix.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: ECR push
        if: matrix.changed == 'true'
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  bump-image-tag:
    runs-on: ubuntu-latest
    needs: [changes, build-and-publish]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true'
    steps:
      - name: 환경 결정 (main → prod, dev → dev)
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: soldesk-k8s 체크아웃
        uses: actions/checkout@v4
        with:
          repository: lhk8080/soldesk-k8s
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: soldesk-k8s

      - name: image.tag 갱신
        working-directory: soldesk-k8s
        env:
          ENV_NAME:    ${{ steps.env.outputs.name }}
          NEW_TAG:     ${{ github.sha }}
          WAS_CHANGED: ${{ needs.changes.outputs.ticketing-was }}
          WORKER_CHANGED: ${{ needs.changes.outputs.worker-svc }}
        run: |
          # github.sha 는 40자 → seed.sh 와 동일하게 짧은 SHA(7자) 로 통일
          SHORT_SHA="${NEW_TAG:0:7}"
          VALUES="environments/${ENV_NAME}/ticketing-values.yaml"
          python3 - "$VALUES" "$SHORT_SHA" "$WAS_CHANGED" "$WORKER_CHANGED" <<'PY'
          import sys, re
          path, tag, was_changed, worker_changed = sys.argv[1:]
          with open(path) as f: text = f.read()
          if was_changed == 'true':
              text = re.sub(r'(image:\s*\n  was:\s*\n    tag:\s*).*', rf'\g<1>{tag}', text, count=1)
          if worker_changed == 'true':
              text = re.sub(r'(  worker:\s*\n    tag:\s*).*', rf'\g<1>{tag}', text, count=1)
          with open(path, 'w') as f: f.write(text)
          PY

          if git diff --quiet "$VALUES"; then
            echo "변경 없음"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VALUES"
          git commit -m "chore(${ENV_NAME}): bump image tag to ${SHORT_SHA}"

          # race 방지: pull --rebase 후 push, 실패 시 5회 retry
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            sleep $((RANDOM % 5 + 2))
          done
          echo "push 5회 실패" >&2
          exit 1
