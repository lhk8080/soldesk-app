name: Backend - Build & Publish (dev)

# dev 브랜치 전용 빌드. main 으로 merge 되면 promote-to-prod.yml 가 dev 의 태그를 prod 로 복사함 (재빌드 없음, 승격 패턴).
on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

concurrency:
  group: build-backend-dev
  cancel-in-progress: false

env:
  AWS_REGION:   ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: 변경 감지
    runs-on: ubuntu-latest
    outputs:
      ticketing-was: ${{ steps.filter.outputs.ticketing-was }}
      worker-svc:    ${{ steps.filter.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ticketing-was: ['backend/ticketing-was/**']
            worker-svc:    ['backend/worker-svc/**']

  build-and-publish:
    name: 빌드 & 푸시 - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: backend/ticketing-was
            repo: ticketing/ticketing-was
            changed: ${{ needs.changes.outputs.ticketing-was }}
          - service: worker-svc
            path: backend/worker-svc
            repo: ticketing/worker-svc
            changed: ${{ needs.changes.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Role ARN 확인 (디버깅)
        if: matrix.changed == 'true'
        run: |
          ARN="${{ secrets.AWS_ROLE_ARN }}"
          # secret 자체는 mask 되지만 계정 ID 부분만 따로 echo 하면 보임
          echo "Role ARN account part: $(echo "$ARN" | cut -d: -f5)"
          echo "Role ARN role part:    $(echo "$ARN" | cut -d/ -f2)"

      - name: AWS 자격증명
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: ECR 로그인
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드
        if: matrix.changed == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ matrix.repo }}
          SHORT_SHA="${GITHUB_SHA:0:7}"
          docker build -t $IMAGE:$SHORT_SHA ${{ matrix.path }}
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      # 학습 단계: 리포트만 (exit-code 0). 익숙해지면 1 로 올려서 push 차단
      - name: Trivy 취약점 스캔
        if: matrix.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          format: 'json'
          output: 'trivy-${{ matrix.service }}.json'

      - name: Trivy 결과 Slack 알림 (취약점 있을 때만)
        if: matrix.changed == 'true'
        run: |
          REPORT="trivy-${{ matrix.service }}.json"
          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$REPORT")
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$REPORT")
          TOTAL=$((CRIT + HIGH))
          echo "CRITICAL=$CRIT HIGH=$HIGH"
          if [ "$TOTAL" -eq 0 ]; then
            echo "취약점 없음 — 알림 스킵"
            exit 0
          fi
          WEBHOOK=$(aws ssm get-parameter \
            --name /ticketing/prod/ARGOCD_SLACK_WEBHOOK \
            --with-decryption --query Parameter.Value --output text)
          MSG="[dev-build] *${{ matrix.service }}*:\`${{ env.SHORT_SHA }}\` — CRITICAL: ${CRIT}, HIGH: ${HIGH} (run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg t "$MSG" '{text:$t}')" \
            "$WEBHOOK"

      - name: ECR push
        if: matrix.changed == 'true'
        run: |
          docker push ${{ env.IMAGE }}:${{ env.SHORT_SHA }}

  bump-image-tag:
    name: dev-values.yaml 태그 갱신
    runs-on: ubuntu-latest
    needs: [changes, build-and-publish]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true'
    steps:
      - name: soldesk-k8s 코드 가져오기
        uses: actions/checkout@v4
        with:
          repository: lhk8080/soldesk-k8s
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: soldesk-k8s

      - name: dev image.tag 갱신
        working-directory: soldesk-k8s
        env:
          NEW_TAG:        ${{ github.sha }}
          WAS_CHANGED:    ${{ needs.changes.outputs.ticketing-was }}
          WORKER_CHANGED: ${{ needs.changes.outputs.worker-svc }}
        run: |
          SHORT_SHA="${NEW_TAG:0:7}"
          VALUES="environments/dev/ticketing-values.yaml"
          python3 - "$VALUES" "$SHORT_SHA" "$WAS_CHANGED" "$WORKER_CHANGED" <<'PY'
          import sys, re
          path, tag, was_changed, worker_changed = sys.argv[1:]
          with open(path) as f: text = f.read()
          if was_changed == 'true':
              text = re.sub(r'(image:\s*\n  was:\s*\n    tag:\s*).*', rf'\g<1>"{tag}"', text, count=1)
          if worker_changed == 'true':
              text = re.sub(r'(  worker:\s*\n    tag:\s*).*', rf'\g<1>"{tag}"', text, count=1)
          with open(path, 'w') as f: f.write(text)
          PY

          if git diff --quiet "$VALUES"; then
            echo "변경 없음"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VALUES"
          git commit -m "chore(dev): bump image tag to ${SHORT_SHA}"

          # race 방지: pull --rebase 후 push, 실패 시 5회 retry
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            sleep $((RANDOM % 5 + 2))
          done
          echo "push 5회 실패" >&2
          exit 1
