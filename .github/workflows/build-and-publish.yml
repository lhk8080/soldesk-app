name: Test, Build & Publish

# CI 역할: test → docker build → ECR push(SHA 태그)
# 배포는 seed.sh 가 kubectl patch 로 ArgoCD Application image tag 를 갱신

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'scripts/**'
      - 'db-schema/**'
  workflow_dispatch:

env:
  AWS_REGION:   ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  # ── 변경 감지 ────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      ticketing-was: ${{ steps.filter.outputs.ticketing-was }}
      worker-svc:    ${{ steps.filter.outputs.worker-svc }}
      frontend:      ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ticketing-was: ['backend/ticketing-was/**']
            worker-svc:    ['backend/worker-svc/**']
            frontend:      ['frontend/**']

  # ── 단위 테스트 ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: backend/ticketing-was
          - service: worker-svc
            path: backend/worker-svc
    steps:
      - uses: actions/checkout@v4

      - name: 변경 여부 확인
        id: check
        run: |
          case "${{ matrix.service }}" in
            ticketing-was) CHANGED="${{ needs.changes.outputs.ticketing-was }}" ;;
            worker-svc)    CHANGED="${{ needs.changes.outputs.worker-svc }}" ;;
          esac
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Python 셋업
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.path }}/requirements-dev.txt

      - name: 의존성 설치
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pip install -r requirements-dev.txt

      - name: pytest
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pytest -v tests/

  # ── 빌드 + ECR push ───────────────────────────────────────────────
  build-and-publish:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true' ||
      needs.changes.outputs.frontend      == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: AWS 자격증명
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: ticketing-was 빌드 & push
        if: needs.changes.outputs.ticketing-was == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/ticketing/ticketing-was
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest backend/ticketing-was
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: worker-svc 빌드 & push
        if: needs.changes.outputs.worker-svc == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/ticketing/worker-svc
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest backend/worker-svc
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: frontend 빌드 & push
        if: needs.changes.outputs.frontend == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/ticketing/frontend
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest frontend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
