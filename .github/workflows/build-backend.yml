name: Backend - Test, Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION:   ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ticketing-was: ${{ steps.filter.outputs.ticketing-was }}
      worker-svc:    ${{ steps.filter.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ticketing-was: ['backend/ticketing-was/**']
            worker-svc:    ['backend/worker-svc/**']

  test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: backend/ticketing-was
            changed: ${{ needs.changes.outputs.ticketing-was }}
          - service: worker-svc
            path: backend/worker-svc
            changed: ${{ needs.changes.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Python 셋업
        if: matrix.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.path }}/requirements-dev.txt

      - name: 의존성 설치
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pip install -r requirements-dev.txt

      - name: pytest
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pytest -v tests/

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: backend/ticketing-was
            repo: ticketing/ticketing-was
            changed: ${{ needs.changes.outputs.ticketing-was }}
          - service: worker-svc
            path: backend/worker-svc
            repo: ticketing/worker-svc
            changed: ${{ needs.changes.outputs.worker-svc }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: AWS 자격증명
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: ECR 로그인
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드
        if: matrix.changed == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ matrix.repo }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ${{ matrix.path }}
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # 학습 단계: 리포트만 (exit-code 0). 익숙해지면 1 로 올려서 push 차단
      - name: Trivy 취약점 스캔
        if: matrix.changed == 'true'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: ECR push
        if: matrix.changed == 'true'
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
